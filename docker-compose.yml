services:
  dev:
    build: .
    user: devuser
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/bash", "-c", "ln -sfn /opt/venv /workspace/.venv && exec bash"]
    stdin_open: true
    tty: true

  simulate:
    build: .
    user: devuser
    volumes:
      - .:/workspace
    working_dir: /workspace
    # Override entrypoint args via: docker compose run simulate [args...]
    # Example:
    #   docker compose run simulate \
    #     --model-file examples/domain.example.json \
    #     --frequency 40 --plot-rays
