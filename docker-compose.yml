services:
  dev:
    build: .
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["bash"]
    stdin_open: true
    tty: true

  simulate:
    build: .
    volumes:
      - .:/workspace
    working_dir: /workspace
    # Override entrypoint args via: docker compose run simulate [args...]
    # Example:
    #   docker compose run simulate --source-model propeller \
    #     --source-model-file examples/source_model.example.json \
    #     --legs-file examples/legs.example.json \
    #     --domain-file examples/domain.example.json \
    #     --output output_propeller_16ch.wav \
    #     --field-plot field_propeller.png --plot-rays
